<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Stickman Parkour - Jouable Direct</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
canvas { display:block; }
#ui { position:fixed; top:10px; left:10px; color:#fff; font-family:sans-serif; }
#overlay { position:fixed; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.9); color:#fff; flex-direction:column; font-size:30px; visibility:hidden; }
button { padding:10px 20px; font-size:20px; }
</style>
</head>
<body>
<div id="ui">Score: <span id="score">0</span> | Vies: <span id="lives">3</span></div>
<div id="overlay"><div id="final"></div><button onclick="location.reload()">Rejouer</button></div>
<canvas id="c"></canvas>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script>
// === INIT ===
const canvas = document.getElementById('c');
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x111111, 20, 250);
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,2,6);
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled = true;
const light = new THREE.DirectionalLight(0xffffff, 1.2);
light.position.set(10,20,10);
light.castShadow = true;
scene.add(light);
scene.add(new THREE.AmbientLight(0x222244));
const road = new THREE.Mesh(
    new THREE.PlaneGeometry(20,2000),
    new THREE.MeshStandardMaterial({color:0x222222})
);
road.rotation.x = -Math.PI/2;
road.receiveShadow = true;
scene.add(road);
// === PLAYER STICKMAN ===
let player = new THREE.Group();
scene.add(player);
player.position.y = 0.5;
const bodyGeom = new THREE.CylinderGeometry(0.2,0.2,1);
const bodyMat = new THREE.MeshStandardMaterial({color:0xffffff});
const body = new THREE.Mesh(bodyGeom, bodyMat);
body.position.y = 0.5;
player.add(body);
const headGeom = new THREE.SphereGeometry(0.25,16,16);
const headMat = new THREE.MeshStandardMaterial({color:0xffff00});
const head = new THREE.Mesh(headGeom, headMat);
head.position.y = 1.25;
player.add(head);
let keys = {}, vy=0, gravity=-0.08, jumpPower=1.3, speed=0.5;
let score=0, lives=3, gameOver=false, jumps=0, maxJumps=2, dashCooldown=0, invincible=0;
const jumpSound=new Audio('https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg');
const hitSound=new Audio('https://actions.google.com/sounds/v1/impacts/crash.ogg');
addEventListener('keydown', e=>keys[e.key]=true);
addEventListener('keyup', e=>keys[e.key]=false);
let touchX=0;
addEventListener('touchstart', e=>{ touchX=e.touches[0].clientX; });
addEventListener('touchmove', e=>{ let dx=e.touches[0].clientX-touchX; player.position.x+=dx*0.01; touchX=e.touches[0].clientX; });
addEventListener('touchend', ()=>{ if(jumps<maxJumps){ vy=jumpPower; jumps++; jumpSound.play(); } });
let obs=[], cars=[];
function spawnObstacle(z){ 
    let h=Math.random()<0.3?2:1; 
    let mesh=new THREE.Mesh(new THREE.BoxGeometry(1,h,1), new THREE.MeshStandardMaterial({color:Math.random()*0xffffff})); 
    mesh.position.set((Math.random()-0.5)*10,h/2,z); 
    scene.add(mesh); obs.push(mesh);
}
for(let i=10;i<2000;i+=4) spawnObstacle(-i);
function spawnCar(z){ 
    let mesh=new THREE.Mesh(new THREE.BoxGeometry(2,1,1), new THREE.MeshStandardMaterial({color:0x0000ff})); 
    mesh.position.set((Math.random()-0.5)*10,0.5,z); 
    mesh.userData={speed:0.3+Math.random()*0.5}; 
    scene.add(mesh); cars.push(mesh);
}
for(let i=20;i<2000;i+=20) spawnCar(-i);
function end(){ 
    if(invincible>0) return; 
    lives--; 
    document.getElementById('lives').innerText=lives; 
    invincible=60; 
    if(lives<=0){ 
        gameOver=true; 
        document.getElementById('final').innerText='Score '+score; 
        document.getElementById('overlay').style.visibility='visible'; 
        hitSound.play(); 
    } 
}
function loop(){
    requestAnimationFrame(loop);
    if(!gameOver){
        if(keys['ArrowLeft']||keys['a']) player.position.x -= speed;
        if(keys['ArrowRight']||keys['d']) player.position.x += speed;
        if(keys[' '] && jumps<maxJumps){ vy=jumpPower; jumps++; keys[' ']=false; jumpSound.play(); }
        if(keys['Shift'] && dashCooldown<=0){ speed=1.2; dashCooldown=60; }
        if(dashCooldown>0){ dashCooldown--; if(dashCooldown===0) speed=0.5; }
        vy += gravity;
        player.position.y += vy;
        if(player.position.y<=0){ player.position.y=0; vy=0; jumps=0; }
        obs.forEach(o=>{
            let dx=Math.abs(player.position.x-o.position.x);
            let dz=Math.abs(player.position.z-o.position.z);
            let dy=player.position.y-o.position.y;
            if(dx<0.8 && dz<0.8){ 
                if(dy<1 && dy>0){ player.position.y=o.position.y+1; vy=0; } 
                else if(dy<=0.5){ end(); } 
            }
        });
        cars.forEach(c=>{
            c.position.z += c.userData.speed;
            if(Math.abs(c.position.x-player.position.x)<1.5){ c.position.x += (c.position.x<player.position.x?-0.05:0.05); }
            if(Math.abs(player.position.x-c.position.x)<1 && Math.abs(player.position.z-c.position.z)<1 && Math.abs(player.position.y-c.position.y)<1){ end(); }
        });
        if(invincible>0) invincible--;
        camera.position.set(player.position.x, player.position.y+2, player.position.z+6);
        camera.lookAt(player.position);
        score++; document.getElementById('score').innerText=score;
    }
    renderer.render(scene,camera);
}
addEventListener('resize', ()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
});
loop();
</script>
</body>
</html>
